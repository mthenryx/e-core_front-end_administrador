<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" type="image/png" href="./img/logo-empresa.png">
    <script src="./js/login/login.js" defer></script>
    <title>Login</title>
</head>
<body>
    <div class="circulo-topo-escuro"></div>
    <div class="circulo-topo-claro"></div>
    <header>
        <a href="https://mthenryx.github.io/e-core_front-end_landing-page/" class="seta">
            <img src="./img/seta-page-login.png" alt="Seta para voltar para página anterior">
        </a>
        <img src="./img/logo-empresa.png" class="logo" alt="Logo da empresa Delicias Geladas">
    </header>
    <main>
        <div class="container">
            <div class="linha-azul"></div>
            <h1>Bem-vindo de volta!</h1>
            <span>Entre na sua conta para continuar</span>
            <hr>

            <div class="caixa">
                <div class="input-grupo">
                    <label for="e-mail">E-MAIL</label>
                    <div class="input-box">
                        <img src="./img/Account Male.png" alt="Icone de uma pessoa">
                        <input type="text" maxlength="256" id="email" placeholder="Digite seu e-mail">
                    </div>
                </div>

                <div class="input-grupo">
                    <label for="senha">SENHA</label>
                    <div class="input-box">
                        <img src="./img/Lock.png" alt="Icone de cadeado">
                        <input type="text" maxlength="70" id="senha" placeholder="Digite sua senha">
                    </div>
                </div>

                <button onclick="validarLogin()">ENTRAR</button>
            </div>
        </div>
    </main>
    <div class="circulo-baixo-claro"></div>
    <div class="circulo-baixo-escuro"></div>
</body>
</html>
